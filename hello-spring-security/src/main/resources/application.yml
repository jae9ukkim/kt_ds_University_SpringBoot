# mybatis 연동 설정
mybatis:
  # mybatis 설정 파일 위치 지정.
  config-location: classpath:mybatis-config.xml
  # mapper 파일들의 위치 지정.
  mapper-locations: classpath:com/ktdsuniversity/edu/**/mapper/*Mapper.xml

spring:
  security:
    oauth2:
      client:
        # 개인정보 조회 요청을 하기 위해 인증 절차를 거치는 설정
        registration:
          # 요청하는 oauth 서비스를 식별할 수 있는 아이디 작성(임의의 명칭)
          google:
            client-id: 
            client-secret: 
            client-name: GOOGLE
            scope: profile,email
          naver:
            # 인증 아이디와 인증 키 설정
            client-id: 
            client-secret: 
            # naver oauth를 구분지을 이름(코드에서)
            client-name: Naver
            # 사용자로부터 받아올 데이터 설정
            scope: name,email
            #사용자의 네이버 로그인 인증 방식
            authorization-grant-type: authorization_code
            # 사용자의 네이버 로그인 콜백URL 지정(네이버 로그인의 결과)
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
        # 인증 절차를 거친 이후 요청한 개인 정보를 받아오는 설정
        provider:
          naver:
            # oauth token 취득 URL (인증, 토큰)
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            # 로그인한 회원의 개인정보 취득 URL(naver가 제공)
            user-info-uri: https://openapi.naver.com/v1/nid/me
            # naver 전용 (oauth2를 통한 개인정보의 취득 결과는 JSON으로 반환이 표준 {email: "", name: "", age: 33})
            # naver는 {response: {email: "", name: "", age: 33}}
            # 개인정보 취득 결과가 들어있는 json key를 설정
            user-name-attribute: response
  servlet:
    multipart: # 파일업로드 용량 정책 설정
      #Spring Server가 한번에 받을 수 있는 최대 용량
      max-file-size: 150MB
      # 파일 업로드를 할 수 있는 최대 용량
      max-request-size: 50MB
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    driver-class-name: oracle.jdbc.driver.OracleDriver
    username: SPRING_BOOT
    password: 1234
  application:
    name: hello-spring-security
    

