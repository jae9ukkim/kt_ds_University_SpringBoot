spring:
  application:
    name: api-gateway-service
# Routing 설정
  cloud:
    gateway:
      server:
        webmvc:
          routes:
          - id: first-service
            predicates:
            - Path=/first-service/**
            uri: lb://FIRST-TEST-API-SERVICE
            filters:
            - AddRequestHeader=f-request, 202606101531
            - AddResponseHeader=api-response, token value
          - id: second-service
            predicates:
            - Path=/second-service/**
            uri: lb://SECOND-TEST-API-SERVICE
            filters:
            - AddRequestHeader=s-request, 202606101531
            - AddResponseHeader=api-response, token value

server:
  port: 8000
  
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaltZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true