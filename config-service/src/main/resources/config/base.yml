# config-serviceлҘј кө¬лҸ…н•ҳлҠ” *-sericeм—җ м „нҢҢн•  кіөнҶө м„Өм •мқ„ мһ‘м„ұ
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    
token:
  secret: very-long-long-user-token-secret-202507101234

spring:
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    
management:
  endpoints:
    web:
      exposure:
        include:
        - health
        - beans
        - refresh
        - info    
        - busrefresh
        - circuitbreakers # circuit breakerмқҳ мғҒнғң лӘЁлӢҲн„°л§Ғ (open, closed, half-open)
        - circuitbreakerevents # circuit breakerмқҳ sliding window лӘЁлӢҲн„°л§Ғ кІ°кіј (мӢӨнҢЁ, м„ұкіө мқҙл Ҙ)
        - metrics
        - prometheus
  # serviceлі„ metricsлҘј service мқҙлҰ„мңјлЎң к·ёлЈ№нҷ”н•ҳм—¬ л…ём¶ңмӢңнӮӨлҸ„лЎқ н•Ё
  metrics:
    tags:
      application: ${spring.application.name}