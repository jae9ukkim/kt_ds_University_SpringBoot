#server:
#  port: 0

spring: 
    application:
        name: tmdb-web
    datasource:
      url: jdbc:oracle:thin:@localhost:1521:XE
      driver-class-name: oracle.jdbc.driver.OracleDriver
      username: TMDB
      password: TMDB
    mvc:
      view:
        prefix: /WEB-INF/views/
        suffix: .jsp
        
# mybatis 연동 설정
mybatis:
    # mybatis 설정 파일 위치 지정
    config-location: classpath:mybatis-config.xml
    # mapper 파일들의 위치 지정
    mapper-locations: classpath:org/themoviedb/**/mapper/*Mapper.xml
  
# 콘솔 로그 레벨 변경
logging:
    level:
      root: debug  
  